<div style="text-align: center; border-bottom: 1px solid var(--copper); padding-bottom: 10px; margin-bottom: 20px;">
    <div style="font-size: 1.2rem; letter-spacing: 4px;">АРХИВ НОЛЬ: ГЛАВНАЯ</div>
</div>

<div style="background: var(--glass); padding: 20px; text-align: center; border: 1px solid var(--copper); margin-bottom: 20px;">
    <div style="font-size: 0.7rem; opacity: 0.8;">КРЕДИТЫ СИСТЕМЫ</div>
    <div id="bal-display" style="font-size: 2.5rem; color: var(--neon);">...</div>
</div>

<button class="menu-btn" onclick="loadModule('market')">ПЕРЕЙТИ НА РЫНОК</button>
<button class="menu-btn" onclick="loadModule('profile')">ЛИЧНОЕ ДЕЛО</button>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let balance = urlParams.get('bal');

    if (balance) {
        // Если зашли из бота, сохраняем баланс в память
        localStorage.setItem('user_balance', balance);
    } else {
        // Если вернулись из другого модуля, берем из памяти
        balance = localStorage.getItem('user_balance') || "0";
    }

    document.getElementById('bal-display').innerText = balance;
</script>

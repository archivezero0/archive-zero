<style>
    .profile-wrap {
        border: 1px solid var(--copper);
        padding: 20px;
        background: linear-gradient(180deg, rgba(205,127,50,0.1) 0%, rgba(0,0,0,0) 100%);
    }
    .stat-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        border-bottom: 1px dashed rgba(205,127,50,0.3);
        padding-bottom: 5px;
    }
    .stat-label { font-size: 0.7rem; opacity: 0.6; }
    .stat-value { font-size: 0.9rem; color: var(--neon); }
</style>

<div class="header">
    <div style="font-size: 1.2rem; letter-spacing: 3px;">ЛИЧНОЕ ДЕЛО</div>
    <div style="font-size: 0.7rem; color: var(--neon); cursor:pointer" onclick="loadModule('home')">[ ВЕРНУТЬСЯ ]</div>
</div>

<div class="profile-wrap">
    <div class="stat-row">
        <div class="stat-label">СУБЪЕКТ</div>
        <div class="stat-value" id="prof-name">LOADING...</div>
    </div>
    <div class="stat-row">
        <div class="stat-label">ID_ДОСТУПА</div>
        <div class="stat-value" id="prof-id">000000</div>
    </div>
    <div class="stat-row">
        <div class="stat-label">СТАТУС</div>
        <div class="stat-value" style="color: #00ff00;">АКТИВЕН</div>
    </div>
    <div class="stat-row">
        <div class="stat-label">РАНГ</div>
        <div class="stat-value">СТРАННИК</div>
    </div>
</div>

<button class="menu-btn" style="margin-top: 20px;" onclick="loadModule('home')">ЗАКРЫТЬ ДЕЛО</button>

<script>
    // Берем данные напрямую из объекта Telegram
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if (user) {
        document.getElementById('prof-name').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
        document.getElementById('prof-id').innerText = user.id;
    }
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* ТВОЙ ДИЗАЙН */
        :root { --copper: #cd7f32; --dark: #0d0d0f; --neon: #00f2ff; --glass: rgba(205, 127, 50, 0.1); }
        body {
            background-color: var(--dark); color: var(--copper); font-family: 'Courier Prime', monospace;
            margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column;
            box-sizing: border-box; border: 2px solid var(--copper); overflow: hidden; position: relative;
        }
        /* Эффект ЭЛТ-монитора */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        #scan-line {
            width: 100%; height: 2px; background: var(--neon); position: absolute;
            top: 0; left: 0; opacity: 0.2; animation: scan 6s linear infinite; z-index: 15;
        }
        @keyframes scan { 0% { top: -2%; } 100% { top: 100%; } }
        #screen-content { z-index: 20; height: 100%; display: flex; flex-direction: column; }
        
        .menu-btn {
            background: transparent; border: 1px solid var(--copper); color: var(--copper);
            padding: 15px; margin-bottom: 10px; text-transform: uppercase; cursor: pointer;
            font-family: inherit; font-weight: bold; width: 100%;
        }
        .menu-btn:active { background: var(--copper); color: var(--dark); }
    </style>
</head>
<body>
    <div id="scan-line"></div>

    <div id="screen-content">
        <div style="text-align:center; padding-top:50px;">ЗАГРУЗКА СИСТЕМЫ...</div>
    </div>

    <script src="main.js?v=1.2"></script>
</body>
</html>
